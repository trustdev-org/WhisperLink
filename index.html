<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="format-detection" content="telephone=no" />
<title>WhisperLink</title>
<style>
/* ============= 全局样式：微信移动端风格 ============= */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  height: 100%; width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  font-size: 16px;
  color: #191919;
  background: #ededed;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}
input, textarea { -webkit-user-select: text; user-select: text; }
button { border: none; background: none; font: inherit; color: inherit; cursor: pointer; padding: 0; }
img { display: block; max-width: 100%; }

#app { height: 100%; width: 100%; position: relative; overflow: hidden; }

/* ============= 登录页 ============= */
.login-page {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 0%, rgba(120,255,180,0.35), transparent 55%),
    radial-gradient(circle at 100% 100%, rgba(64,160,255,0.25), transparent 55%),
    linear-gradient(160deg, #0a3d2e 0%, #0a1a26 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px;
  z-index: 10;
  overflow-y: auto;
}
.login-logo {
  width: 84px; height: 84px; border-radius: 22px;
  background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
  border: 1px solid rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; color: #fff; margin-bottom: 16px;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}
.login-title {
  color: #fff; font-size: 30px; font-weight: 700; margin: 0 0 6px;
  letter-spacing: 0.5px;
}
.login-subtitle {
  color: rgba(255,255,255,0.75); font-size: 13px; margin-bottom: 28px;
  letter-spacing: 1px;
}
.login-card {
  width: 100%; max-width: 380px;
  background: rgba(255,255,255,0.97);
  border-radius: 18px; padding: 22px 22px 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
}
.login-field { margin-bottom: 14px; }
.login-field label {
  display: block; font-size: 12px; color: #6b7280;
  margin-bottom: 6px; font-weight: 500;
  letter-spacing: 0.3px;
}
.login-field input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid #e5e7eb; border-radius: 10px;
  font-size: 15px; outline: none;
  background: #f9fafb;
  transition: border-color .2s, background .2s;
}
.login-field input:focus { border-color: #07c160; background: #fff; }
.login-input-row { display: flex; gap: 8px; align-items: stretch; }
.login-input-row input { flex: 1; }
.dice-btn {
  width: 46px; flex-shrink: 0;
  border: 1.5px solid #e5e7eb;
  background: #f9fafb;
  border-radius: 10px;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #6b7280;
  transition: all .15s;
}
.dice-btn:hover { background: #fff; border-color: #07c160; color: #07c160; }
.dice-btn:active { transform: scale(0.95); }

/* Tab 切换 */
.login-tabs {
  display: flex;
  background: #f3f4f6;
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 14px;
  gap: 2px;
}
.login-tab {
  flex: 1; padding: 9px 0;
  font-size: 13px; font-weight: 500;
  color: #6b7280;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
}
.login-tab.active {
  background: #fff; color: #111827;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.login-tab .badge {
  display: inline-block;
  background: #07c160; color: #fff;
  font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 8px;
  margin-left: 4px;
  vertical-align: 1px;
}
.login-tab:not(.active) .badge { background: #d1d5db; color: #fff; }

/* 历史频道列表 */
.channel-list {
  max-height: 240px;
  overflow-y: auto;
  margin: 0 -4px 6px;
  padding: 0 4px;
}
.channel-item {
  display: flex; align-items: center;
  padding: 11px 12px;
  border: 1.5px solid #e5e7eb;
  border-radius: 10px;
  margin-bottom: 8px;
  background: #fff;
  cursor: pointer;
  transition: all .15s;
}
.channel-item:hover {
  border-color: #07c160;
  background: #f0fdf4;
}
.channel-item .ch-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: 600;
  flex-shrink: 0; margin-right: 10px;
}
.channel-item .ch-info { flex: 1; min-width: 0; }
.channel-item .ch-name {
  font-size: 14px; font-weight: 600;
  color: #111827;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.channel-item .ch-time {
  font-size: 11px; color: #9ca3af; margin-top: 2px;
}
.channel-item .ch-del {
  width: 28px; height: 28px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: #9ca3af; font-size: 16px;
  flex-shrink: 0;
}
.channel-item .ch-del:hover { background: #fee2e2; color: #ef4444; }
.channel-list-empty {
  text-align: center; padding: 28px 12px;
  color: #9ca3af; font-size: 13px;
}

.login-field-hint {
  font-size: 11px; color: #9ca3af; margin-top: 6px;
  line-height: 1.5;
}
.login-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
  color: #fff;
  border-radius: 10px; font-size: 15px; font-weight: 600;
  transition: all .2s;
  box-shadow: 0 4px 14px rgba(7,193,96,0.35);
  letter-spacing: 0.5px;
}
.login-btn:hover { box-shadow: 0 6px 20px rgba(7,193,96,0.45); }
.login-btn:active { transform: scale(0.98); }
.login-btn:disabled { opacity: .5; box-shadow: none; }
.login-tip {
  margin-top: 16px; font-size: 11px; color: #fff;
  text-align: center; line-height: 1.7;
  opacity: 0.6;
}
.login-tip kbd {
  background: rgba(255,255,255,0.15);
  padding: 1px 5px; border-radius: 3px;
  font-family: inherit; font-size: 10px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ============= 主界面 ============= */
.main {
  position: absolute; inset: 0;
  display: flex;
  background: #ededed;
}
/* 左侧会话列表 */
.sidebar {
  width: 100%;
  max-width: 100%;
  background: #fff;
  display: flex; flex-direction: column;
  border-right: 1px solid #e5e7eb;
}
.sidebar-header {
  padding: calc(env(safe-area-inset-top, 0px) + 14px) 16px 14px;
  background: linear-gradient(180deg, #fafafa 0%, #f3f4f6 100%);
  border-bottom: 1px solid #e5e7eb;
  display: flex; justify-content: space-between; align-items: center;
  gap: 8px;
}
.sidebar-header h1 {
  font-size: 17px; font-weight: 600; margin: 0;
  color: #111827;
  flex-shrink: 0;
  max-width: 50%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sidebar-header .header-actions {
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.sidebar-header .room-tag {
  font-size: 12px; color: #07c160;
  background: rgba(7,193,96,0.1);
  padding: 4px 10px; border-radius: 999px;
  font-weight: 500;
  max-width: 140px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sidebar-header .icon-btn {
  width: 32px; height: 32px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #6b7280;
  cursor: pointer;
  transition: all .15s;
}
.sidebar-header .icon-btn:hover { background: rgba(0,0,0,0.06); color: #111827; }
.sidebar-header .icon-btn.muted { color: #9ca3af; }
.conv-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.conv-item {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid #f3f4f6;
  position: relative;
  transition: background .15s;
  cursor: pointer;
}
.conv-item:hover { background: #f9fafb; }
.conv-item:active { background: #f3f4f6; }
.conv-item.active { background: #f0fdf4; }
.conv-avatar {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 17px; font-weight: 600;
  margin-right: 12px; flex-shrink: 0;
  position: relative;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.conv-info { flex: 1; min-width: 0; }
.conv-name { font-size: 16px; font-weight: 500; color: #191919; margin-bottom: 4px; }
.conv-preview { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.conv-time { font-size: 11px; color: #b2b2b2; }
.unread-dot {
  background: #fa5151; color: #fff;
  font-size: 11px; min-width: 18px; height: 18px;
  border-radius: 9px; padding: 0 5px;
  display: flex; align-items: center; justify-content: center;
}

/* 右侧聊天区 */
.chat {
  flex: 1;
  display: flex; flex-direction: column;
  background: #ededed;
  position: relative;
}
.chat-header {
  display: flex; align-items: center;
  padding: calc(env(safe-area-inset-top, 0px) + 10px) 12px 10px;
  background: linear-gradient(180deg, #fafafa 0%, #f3f4f6 100%);
  border-bottom: 1px solid #e5e7eb;
  position: relative;
  z-index: 5;
  gap: 4px;
}
.back-btn {
  width: 36px; height: 36px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #111827;
  transition: background .15s;
}
.back-btn:hover { background: rgba(0,0,0,0.06); }
.chat-title {
  flex: 1; text-align: center; font-size: 16px; font-weight: 600;
  color: #111827;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-action {
  width: 36px; height: 36px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #6b7280;
  transition: all .15s;
}
.chat-action:hover { background: rgba(0,0,0,0.06); color: #111827; }

/* 消息区 */
.msg-list {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 12px 12px 4px;
}
.msg-time {
  text-align: center; font-size: 11px; color: #b2b2b2;
  margin: 12px 0;
}
.msg-row {
  display: flex; margin-bottom: 14px;
  align-items: flex-start;
}
.msg-row.self { flex-direction: row-reverse; }
.msg-avatar {
  width: 38px; height: 38px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 15px; font-weight: 500;
  flex-shrink: 0;
}
.msg-content {
  max-width: 70%;
  margin: 0 8px;
}
.msg-nickname {
  font-size: 11px; color: #888;
  margin-bottom: 4px; padding: 0 2px;
}
.msg-row.self .msg-nickname { text-align: right; display: none; }
.msg-bubble {
  padding: 9px 12px;
  border-radius: 6px;
  font-size: 15px; line-height: 1.45;
  word-break: break-word;
  position: relative;
  background: #fff;
  box-shadow: 0 1px 0.5px rgba(0,0,0,0.05);
}
.msg-row.self .msg-bubble {
  background: #95ec69;
  color: #191919;
}
.msg-bubble.image-bubble {
  padding: 3px;
  background: transparent !important;
  box-shadow: none;
}
.msg-bubble.image-bubble img {
  max-width: 200px; max-height: 260px;
  border-radius: 6px;
  cursor: pointer;
}
.msg-bubble.system {
  background: rgba(0,0,0,0.06); color: #888;
  font-size: 12px; padding: 4px 10px;
  border-radius: 4px; text-align: center;
  margin: 0 auto;
}
.msg-row.system { justify-content: center; }
.msg-row.system .msg-avatar { display: none; }
.msg-row.system .msg-content { margin: 0; max-width: 80%; }

/* 群聊房间置顶说明卡片 */
.room-tip {
  background: #fffbe6;
  border: 1px solid #ffe58f;
  border-radius: 8px;
  padding: 10px 12px;
  margin: 0 0 12px;
  font-size: 12px;
  line-height: 1.6;
  color: #594300;
  position: relative;
}
.room-tip-title {
  font-weight: 600; font-size: 13px;
  color: #ad6800; margin-bottom: 4px;
  display: flex; align-items: center; gap: 4px;
}
.room-tip ul { margin: 4px 0 0; padding-left: 18px; }
.room-tip li { margin: 2px 0; }
.room-tip-close {
  position: absolute; top: 6px; right: 8px;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #ad6800; cursor: pointer;
  background: transparent;
}

/* 底部输入栏 */
.input-bar {
  background: #f7f7f7;
  border-top: 1px solid #d8d8d8;
  padding: 8px 8px calc(env(safe-area-inset-bottom, 0px) + 8px);
  display: flex; align-items: flex-end; gap: 8px;
}
.input-bar textarea {
  flex: 1;
  border: 1px solid #d8d8d8;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 16px;
  resize: none;
  background: #fff;
  outline: none;
  min-height: 36px;
  max-height: 120px;
  line-height: 1.4;
  font-family: inherit;
}
.input-icon-btn {
  width: 36px; height: 36px; border-radius: 6px;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #555;
  flex-shrink: 0;
}
.input-icon-btn:active { background: #e0e0e0; }
.send-btn {
  background: #07c160; color: #fff;
  padding: 8px 16px; border-radius: 6px;
  font-size: 14px; font-weight: 500;
  flex-shrink: 0; height: 36px;
}
.send-btn:disabled { background: #bbb; }

/* 空状态 */
.empty-chat {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #b2b2b2; font-size: 14px;
  text-align: center; padding: 24px;
}
.empty-chat .icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }

/* 图片预览 */
.image-viewer {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.image-viewer img { max-width: 100%; max-height: 100%; }

/* 通话悬浮窗 */
.call-float {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 60px);
  right: 12px;
  background: rgba(0,0,0,0.85);
  color: #fff;
  border-radius: 12px;
  padding: 12px 14px;
  z-index: 800;
  min-width: 180px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
}
.call-float .title { font-size: 13px; margin-bottom: 6px; opacity: .8; }
.call-float .status { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
.call-float .members { font-size: 12px; opacity: .8; margin-bottom: 10px; max-height: 60px; overflow-y: auto; }
.call-float .actions { display: flex; gap: 8px; }
.call-btn {
  flex: 1;
  padding: 8px 0;
  border-radius: 8px;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.call-btn.mic-on { background: rgba(255,255,255,0.15); color: #fff; }
.call-btn.mic-off { background: #fa5151; color: #fff; }
.call-btn.hangup { background: #fa5151; color: #fff; }

/* 来电邀请弹窗 */
.call-invite {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: flex; align-items: center; justify-content: center;
}
.call-invite-card {
  background: #fff;
  border-radius: 14px;
  padding: 24px;
  width: 80%; max-width: 320px;
  text-align: center;
}
.call-invite-card h3 { margin: 0 0 8px; font-size: 18px; }
.call-invite-card p { color: #888; margin: 0 0 20px; font-size: 14px; }
.call-invite-card .btns { display: flex; gap: 12px; }
.call-invite-card button { flex: 1; padding: 11px; border-radius: 8px; font-size: 15px; }
.btn-reject { background: #f0f0f0; color: #191919; }
.btn-accept { background: #07c160; color: #fff; }

/* 加载提示 */
.toast {
  position: fixed; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8); color: #fff;
  padding: 10px 18px; border-radius: 8px;
  font-size: 14px; z-index: 1100;
  pointer-events: none;
  opacity: 0; transition: opacity .2s;
}
.toast.show { opacity: 1; }

/* 连接状态条 */
.conn-status {
  position: fixed; top: 0; left: 0; right: 0;
  background: #fa5151; color: #fff;
  font-size: 12px; text-align: center;
  padding: 4px;
  z-index: 1200;
  transform: translateY(-100%);
  transition: transform .25s;
}
.conn-status.show { transform: translateY(0); }

/* ============= 桌面端布局 ============= */
@media (min-width: 768px) {
  .sidebar { max-width: 320px; }
  .main { flex-direction: row; }
  .back-btn { display: none; }
  .chat { display: flex !important; }
}

/* ============= 移动端：左右切换 ============= */
@media (max-width: 767px) {
  .main.show-chat .sidebar { display: none; }
  .main:not(.show-chat) .chat { display: none; }
}

/* 隐藏滚动条 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

/* 头像颜色 */
.avatar-c0 { background: #fa5151; }
.avatar-c1 { background: #ff8f1f; }
.avatar-c2 { background: #ffc300; }
.avatar-c3 { background: #07c160; }
.avatar-c4 { background: #10aeff; }
.avatar-c5 { background: #6467f0; }
.avatar-c6 { background: #b620e0; }
.avatar-c7 { background: #ee5a87; }
</style>
</head>
<body>
<div id="app">

  <!-- 登录页 -->
  <div class="login-page" id="loginPage">
    <div class="login-logo">💬</div>
    <h1 class="login-title">WhisperLink</h1>
    <div class="login-subtitle">端到端加密 · 私密通讯</div>
    <div class="login-card">
      <div class="login-field">
        <label>昵称</label>
        <div class="login-input-row">
          <input id="nicknameInput" type="text" maxlength="16" placeholder="给自己起个名字" />
          <button type="button" class="dice-btn" id="randomNickBtn" title="随机生成昵称">🎲</button>
        </div>
      </div>

      <div class="login-tabs" id="loginTabs">
        <div class="login-tab active" data-tab="new">新建 / 加入</div>
        <div class="login-tab" data-tab="history">历史频道<span class="badge" id="historyBadge">0</span></div>
      </div>

      <!-- 新建 / 加入 -->
      <div class="tab-panel active" id="tabPanelNew">
        <div class="login-field">
          <label>频道码（4–32 位字母或数字）</label>
          <div class="login-input-row">
            <input id="roomInput" type="text" maxlength="32" placeholder="留空将自动生成" autocapitalize="off" autocorrect="off" />
            <button type="button" class="dice-btn" id="randomRoomBtn" title="随机生成 12 位频道">🎲</button>
          </div>
          <div class="login-field-hint">把同一个频道码分享给好友，即可一起加密聊天。</div>
        </div>
        <button class="login-btn" id="loginBtn">进入聊天室</button>
      </div>

      <!-- 历史频道 -->
      <div class="tab-panel" id="tabPanelHistory">
        <div class="channel-list" id="channelList"></div>
      </div>
    </div>
    <div class="login-tip">
      🔒 端到端加密 · 服务端不存储任何聊天记录<br/>
      <kbd>Enter</kbd> 提交 · <kbd>🎲</kbd> 随机生成
    </div>
  </div>

  <!-- 主界面 -->
  <div class="main" id="mainPage" style="display:none;">
    <!-- 侧边栏：会话列表 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1 id="sidebarTitle">聊天</h1>
        <div class="header-actions">
          <span class="room-tag" id="roomTag"></span>
          <button class="icon-btn" id="soundToggle" title="提示音开/关">🔔</button>
          <button class="icon-btn" id="leaveBtn" title="退出频道">⏻</button>
        </div>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>

    <!-- 聊天区 -->
    <div class="chat" id="chatArea">
      <div class="chat-header">
        <button class="back-btn" id="backBtn">‹</button>
        <div class="chat-title" id="chatTitle">选择一个会话</div>
        <button class="chat-action" id="shareBtn" title="分享当前频道">🔗</button>
        <button class="chat-action" id="callBtn" title="发起语音通话">📞</button>
      </div>
      <div class="msg-list" id="msgList"></div>
      <div class="input-bar">
        <button class="input-icon-btn" id="imageBtn" title="发送图片">📷</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" />
        <textarea id="msgInput" rows="1" placeholder="输入消息..."></textarea>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
    </div>
  </div>

  <!-- 通话悬浮窗 -->
  <div class="call-float" id="callFloat" style="display:none;">
    <div class="title" id="callTitle">语音通话</div>
    <div class="status" id="callStatus">连接中...</div>
    <div class="members" id="callMembers"></div>
    <div class="actions">
      <button class="call-btn mic-on" id="micBtn">🎤 静音</button>
      <button class="call-btn hangup" id="hangupBtn">📴 挂断</button>
    </div>
  </div>

  <!-- 来电邀请 -->
  <div class="call-invite" id="callInvite" style="display:none;">
    <div class="call-invite-card">
      <h3 id="inviteName">邀请你语音通话</h3>
      <p id="inviteDesc">语音通话邀请</p>
      <div class="btns">
        <button class="btn-reject" id="rejectBtn">拒绝</button>
        <button class="btn-accept" id="acceptBtn">接听</button>
      </div>
    </div>
  </div>

  <!-- 图片预览 -->
  <div class="image-viewer" id="imageViewer" style="display:none;">
    <img id="viewerImg" alt="" />
  </div>

  <!-- 连接状态条 -->
  <div class="conn-status" id="connStatus">连接断开，正在重连...</div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<script>
/* =====================================================
 * WhisperLink 前端
 * 功能：端到端加密群聊 + 私聊 + WebRTC 语音通话
 * ===================================================== */

// ---------- 工具 ----------
const $ = (id) => document.getElementById(id);
const enc = new TextEncoder();
const dec = new TextDecoder();

function uuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function showToast(msg, ms = 1800) {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

// 头像颜色：基于昵称首字符
function avatarOf(name) {
  const ch = (name || '?').trim().charAt(0).toUpperCase() || '?';
  let hash = 0;
  for (let i = 0; i < (name || '').length; i++) hash = (hash * 31 + (name || '').charCodeAt(i)) & 0xffffffff;
  const colorIdx = Math.abs(hash) % 8;
  return { ch, color: 'avatar-c' + colorIdx };
}

function buf2b64(buf) {
  const bytes = new Uint8Array(buf);
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function b642buf(b64) {
  const s = atob(b64);
  const arr = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) arr[i] = s.charCodeAt(i);
  return arr.buffer;
}

// ---------- 加密：群聊用频道码 PBKDF2 派生 AES-GCM ----------
async function deriveRoomKey(roomCode) {
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(roomCode),
    { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {
      name: 'PBKDF2',
      salt: enc.encode('WhisperLink-Salt-v1:' + roomCode),
      iterations: 100000,
      hash: 'SHA-256',
    },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function aesEncrypt(key, plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv },
    key,
    enc.encode(plaintext)
  );
  return { iv: buf2b64(iv), ciphertext: buf2b64(ct) };
}
async function aesDecrypt(key, ivB64, ctB64) {
  const iv = new Uint8Array(b642buf(ivB64));
  const pt = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv },
    key,
    b642buf(ctB64)
  );
  return dec.decode(pt);
}

// ---------- 私聊：ECDH 协商密钥 ----------
async function genECDHKeyPair() {
  return crypto.subtle.generateKey(
    { name: 'ECDH', namedCurve: 'P-256' },
    true,
    ['deriveKey']
  );
}
async function exportPubKey(keyPair) {
  const raw = await crypto.subtle.exportKey('spki', keyPair.publicKey);
  return buf2b64(raw);
}
async function importPubKey(b64) {
  return crypto.subtle.importKey(
    'spki', b642buf(b64),
    { name: 'ECDH', namedCurve: 'P-256' },
    false, []
  );
}
async function deriveSharedKey(myPriv, theirPub) {
  return crypto.subtle.deriveKey(
    { name: 'ECDH', public: theirPub },
    myPriv,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

// ---------- 应用状态 ----------
const State = {
  ws: null,
  reconnectTimer: null,
  roomId: null,
  nickname: null,
  userId: uuid(),
  roomKey: null,                 // 群聊共享密钥 (AES-GCM)
  ecdhKeyPair: null,             // 本机 ECDH 密钥对
  pubKeyB64: null,               // 本机 ECDH 公钥 base64
  privateKeys: new Map(),        // userId -> AES-GCM key (私聊)
  pendingPrivKeyResolvers: new Map(), // userId -> [resolve...]
  users: new Map(),              // userId -> { nickname }
  // 会话：'group' 或 userId
  conversations: new Map(),      // convId -> { id, type, name, messages[], unread, lastTs }
  activeConv: null,
  call: null, // { channel, peers: Map<userId, RTCPeerConnection>, localStream, isMuted, target? }
  turnConfig: null,
  muted: false,
};

// ---------- WebSocket ----------
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  State.ws = new WebSocket(url);

  State.ws.onopen = () => {
    $('connStatus').classList.remove('show');
    // 加入房间
    sendWS({
      type: 'join',
      roomId: State.roomId,
      userId: State.userId,
      nickname: State.nickname,
    });
    // 广播自己的 ECDH 公钥
    sendWS({
      type: 'webrtc_signal',
      signal: { kind: 'ecdh_pub', pub: State.pubKeyB64 },
      channel: 'private',
    });
  };

  State.ws.onmessage = async (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (_) { return; }
    await handleServerMessage(msg);
  };

  State.ws.onclose = () => {
    $('connStatus').classList.add('show');
    if (State.reconnectTimer) return;
    State.reconnectTimer = setTimeout(() => {
      State.reconnectTimer = null;
      connect();
    }, 2000);
  };

  State.ws.onerror = () => {
    try { State.ws.close(); } catch (_) {}
  };
}

function sendWS(payload) {
  if (State.ws && State.ws.readyState === WebSocket.OPEN) {
    State.ws.send(JSON.stringify(payload));
  }
}

async function handleServerMessage(msg) {
  switch (msg.type) {
    case 'user_list': {
      State.users.clear();
      msg.users.forEach(u => {
        if (u.userId !== State.userId) State.users.set(u.userId, { nickname: u.nickname });
      });
      renderConvList();
      break;
    }
    case 'user_joined': {
      State.users.set(msg.userId, { nickname: msg.nickname });
      renderConvList();
      // 主动把公钥再广播一次，方便新人协商
      sendWS({
        type: 'webrtc_signal',
        to: msg.userId,
        signal: { kind: 'ecdh_pub', pub: State.pubKeyB64 },
        channel: 'private',
      });
      break;
    }
    case 'user_left': {
      State.users.delete(msg.userId);
      State.privateKeys.delete(msg.userId);
      renderConvList();
      // 通话中有人离开
      if (State.call && State.call.peers.has(msg.userId)) {
        const pc = State.call.peers.get(msg.userId);
        try { pc.close(); } catch (_) {}
        State.call.peers.delete(msg.userId);
        updateCallUI();
      }
      break;
    }
    case 'message': {
      // 群消息，使用 roomKey 解密
      try {
        const text = await aesDecrypt(State.roomKey, msg.iv, msg.ciphertext);
        const payload = JSON.parse(text);
        recvMessage('group', {
          from: msg.from,
          fromNickname: msg.fromNickname,
          msgType: msg.msgType,
          content: payload.content,
          ts: msg.ts,
        });
      } catch (e) {
        console.warn('解密群消息失败', e);
      }
      break;
    }
    case 'private_message': {
      const key = State.privateKeys.get(msg.from);
      if (!key) {
        // 还没协商好，缓存，等待 ecdh 完成
        console.warn('收到未协商私聊密钥的消息', msg.from);
        return;
      }
      try {
        const text = await aesDecrypt(key, msg.iv, msg.ciphertext);
        const payload = JSON.parse(text);
        recvMessage(msg.from, {
          from: msg.from,
          fromNickname: msg.fromNickname,
          msgType: msg.msgType,
          content: payload.content,
          ts: msg.ts,
        });
      } catch (e) {
        console.warn('解密私聊消息失败', e);
      }
      break;
    }
    case 'webrtc_signal': {
      await handleWebRTCSignal(msg);
      break;
    }
    case 'call_control': {
      await handleCallControl(msg);
      break;
    }
  }
}

// ---------- 收发消息 ----------
function ensureConv(id, type, name) {
  if (!State.conversations.has(id)) {
    State.conversations.set(id, {
      id, type, name,
      messages: [], unread: 0, lastTs: 0,
    });
  }
  return State.conversations.get(id);
}

function recvMessage(convId, m) {
  let conv;
  if (convId === 'group') {
    conv = ensureConv('group', 'group', '群聊房间');
  } else {
    const u = State.users.get(convId);
    conv = ensureConv(convId, 'private', u ? u.nickname : '私聊');
  }
  conv.messages.push(m);
  conv.lastTs = m.ts;
  if (State.activeConv !== conv.id) {
    conv.unread++;
  }
  renderConvList();
  if (State.activeConv === conv.id) {
    appendMsgDom(m);
    scrollToBottom();
  }
  // 收到他人消息且不在该会话焦点 → 提示音
  if (m.from && m.from !== State.userId && shouldNotifyFor(conv.id)) {
    playBeep();
  }
}

async function sendMessage(msgType, content) {
  const conv = State.conversations.get(State.activeConv);
  if (!conv) return;
  const payload = JSON.stringify({ content });
  if (conv.type === 'group') {
    const { iv, ciphertext } = await aesEncrypt(State.roomKey, payload);
    sendWS({ type: 'message', msgType, iv, ciphertext });
  } else {
    let key = State.privateKeys.get(conv.id);
    if (!key) {
      // 触发 ECDH，等待
      showToast('正在协商加密密钥...');
      key = await waitForPrivateKey(conv.id, 5000);
      if (!key) { showToast('对方未在线或协商失败'); return; }
    }
    const { iv, ciphertext } = await aesEncrypt(key, payload);
    sendWS({ type: 'private_message', to: conv.id, msgType, iv, ciphertext });
  }
  // 本地回显
  const m = {
    from: State.userId,
    fromNickname: State.nickname,
    msgType, content,
    ts: Date.now(),
  };
  conv.messages.push(m);
  conv.lastTs = m.ts;
  renderConvList();
  appendMsgDom(m);
  scrollToBottom();
}

function waitForPrivateKey(userId, timeoutMs) {
  return new Promise((resolve) => {
    if (State.privateKeys.has(userId)) return resolve(State.privateKeys.get(userId));
    const arr = State.pendingPrivKeyResolvers.get(userId) || [];
    arr.push(resolve);
    State.pendingPrivKeyResolvers.set(userId, arr);
    // 主动请求公钥
    sendWS({
      type: 'webrtc_signal',
      to: userId,
      signal: { kind: 'ecdh_request' },
      channel: 'private',
    });
    setTimeout(() => resolve(null), timeoutMs);
  });
}

// ---------- WebRTC 信令处理 ----------
async function handleWebRTCSignal(msg) {
  const { from, signal, channel } = msg;
  // ECDH 公钥交换
  if (signal.kind === 'ecdh_pub') {
    try {
      const theirPub = await importPubKey(signal.pub);
      const sharedKey = await deriveSharedKey(State.ecdhKeyPair.privateKey, theirPub);
      State.privateKeys.set(from, sharedKey);
      // 唤醒等待者
      const waiters = State.pendingPrivKeyResolvers.get(from);
      if (waiters) {
        waiters.forEach(r => r(sharedKey));
        State.pendingPrivKeyResolvers.delete(from);
      }
    } catch (e) { console.warn('ECDH 失败', e); }
    return;
  }
  if (signal.kind === 'ecdh_request') {
    sendWS({
      type: 'webrtc_signal',
      to: from,
      signal: { kind: 'ecdh_pub', pub: State.pubKeyB64 },
      channel: 'private',
    });
    return;
  }
  // 通话相关
  if (signal.kind === 'offer' || signal.kind === 'answer' || signal.kind === 'candidate') {
    if (!State.call) {
      // 收到 offer 但本地未在通话 -> 自动建立（已经接听过 invite）
      // 这里要求必须先 accept 才会进入 call
      if (signal.kind !== 'offer') return;
      // 没有 call 上下文，忽略
      return;
    }
    let pc = State.call.peers.get(from);
    if (!pc) pc = createPeerConnection(from);
    try {
      if (signal.kind === 'offer') {
        await pc.setRemoteDescription({ type: 'offer', sdp: signal.sdp });
        const ans = await pc.createAnswer();
        await pc.setLocalDescription(ans);
        sendWS({
          type: 'webrtc_signal',
          to: from,
          channel: State.call.channel,
          signal: { kind: 'answer', sdp: ans.sdp },
        });
      } else if (signal.kind === 'answer') {
        await pc.setRemoteDescription({ type: 'answer', sdp: signal.sdp });
      } else if (signal.kind === 'candidate' && signal.candidate) {
        await pc.addIceCandidate(signal.candidate);
      }
    } catch (e) { console.warn('信令处理失败', e); }
  }
}

async function handleCallControl(msg) {
  if (msg.action === 'invite') {
    if (State.call) {
      // 已经在通话，自动拒绝
      sendWS({ type: 'call_control', to: msg.from, action: 'reject', channel: msg.channel });
      return;
    }
    showInvite(msg);
  } else if (msg.action === 'accept') {
    // 对方接听，发起 offer
    if (State.call) await initiateOfferTo(msg.from);
  } else if (msg.action === 'reject') {
    showToast('对方拒绝了通话');
  } else if (msg.action === 'hangup') {
    if (State.call && State.call.channel === 'private' && msg.from === State.call.target) {
      endCall();
    } else if (State.call) {
      // 群通话有人挂断
      const pc = State.call.peers.get(msg.from);
      if (pc) { try { pc.close(); } catch (_) {} State.call.peers.delete(msg.from); }
      updateCallUI();
    }
  }
}

// ---------- WebRTC 通话 ----------
async function fetchTurnConfig() {
  if (State.turnConfig) return State.turnConfig;
  try {
    const r = await fetch('/turn-config');
    State.turnConfig = await r.json();
  } catch (e) {
    State.turnConfig = null;
  }
  return State.turnConfig;
}

function buildIceServers(turn) {
  // ICE 优先 TURN（国内 NAT 穿透成功率低），同时保留 STUN 兜底
  const list = [];
  if (turn && turn.urls) {
    list.push({ urls: turn.urls, username: turn.username, credential: turn.credential });
  }
  list.push({ urls: 'stun:stun.l.google.com:19302' });
  return list;
}

function createPeerConnection(remoteUserId) {
  const turn = State.turnConfig;
  const pc = new RTCPeerConnection({
    iceServers: buildIceServers(turn),
    iceTransportPolicy: 'all',
  });
  // 加本地音轨
  if (State.call && State.call.localStream) {
    State.call.localStream.getTracks().forEach(t => pc.addTrack(t, State.call.localStream));
  }
  pc.onicecandidate = (ev) => {
    if (ev.candidate) {
      sendWS({
        type: 'webrtc_signal',
        to: remoteUserId,
        channel: State.call ? State.call.channel : 'group',
        signal: { kind: 'candidate', candidate: ev.candidate },
      });
    }
  };
  pc.ontrack = (ev) => {
    let audio = document.getElementById('audio-' + remoteUserId);
    if (!audio) {
      audio = document.createElement('audio');
      audio.id = 'audio-' + remoteUserId;
      audio.autoplay = true;
      audio.playsInline = true;
      document.body.appendChild(audio);
    }
    audio.srcObject = ev.streams[0];
  };
  pc.onconnectionstatechange = () => {
    if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) {
      // 自动清理
    }
    updateCallUI();
  };
  if (State.call) State.call.peers.set(remoteUserId, pc);
  return pc;
}

async function initiateOfferTo(remoteUserId) {
  const pc = State.call.peers.get(remoteUserId) || createPeerConnection(remoteUserId);
  const offer = await pc.createOffer({ offerToReceiveAudio: true });
  await pc.setLocalDescription(offer);
  sendWS({
    type: 'webrtc_signal',
    to: remoteUserId,
    channel: State.call.channel,
    signal: { kind: 'offer', sdp: offer.sdp },
  });
}

async function startCall(channel, target) {
  if (State.call) { showToast('已在通话中'); return; }
  await fetchTurnConfig();
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    showToast('无法访问麦克风：' + e.message);
    return;
  }
  State.call = {
    channel, target: target || null,
    peers: new Map(),
    localStream: stream,
    isMuted: false,
  };
  showCallFloat();
  // 发起通话邀请
  const ctrl = { type: 'call_control', action: 'invite', channel };
  if (target) ctrl.to = target;
  sendWS(ctrl);
  $('callStatus').textContent = '等待对方接听...';
}

function showInvite(msg) {
  $('inviteName').textContent = (msg.fromNickname || '对方') + ' 邀请你语音通话';
  $('inviteDesc').textContent = msg.channel === 'group' ? '群语音通话' : '一对一语音通话';
  $('callInvite').style.display = 'flex';
  $('callInvite')._invite = msg;
}

async function acceptInvite() {
  const msg = $('callInvite')._invite;
  $('callInvite').style.display = 'none';
  if (!msg) return;
  await fetchTurnConfig();
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    showToast('无法访问麦克风：' + e.message);
    sendWS({ type: 'call_control', to: msg.from, action: 'reject', channel: msg.channel });
    return;
  }
  State.call = {
    channel: msg.channel,
    target: msg.channel === 'private' ? msg.from : null,
    peers: new Map(),
    localStream: stream,
    isMuted: false,
  };
  showCallFloat();
  $('callStatus').textContent = '通话中';
  sendWS({ type: 'call_control', to: msg.from, action: 'accept', channel: msg.channel });
}

function rejectInvite() {
  const msg = $('callInvite')._invite;
  $('callInvite').style.display = 'none';
  if (msg) sendWS({ type: 'call_control', to: msg.from, action: 'reject', channel: msg.channel });
}

function showCallFloat() {
  $('callFloat').style.display = 'block';
  $('callTitle').textContent = State.call.channel === 'private' ? '私聊语音' : '群语音';
  updateCallUI();
}

function updateCallUI() {
  if (!State.call) return;
  const names = [];
  State.call.peers.forEach((pc, uid) => {
    const u = State.users.get(uid);
    names.push((u ? u.nickname : '?') + ' (' + (pc.connectionState || 'new') + ')');
  });
  $('callMembers').textContent = names.length ? '在线: ' + names.join(', ') : '等待对方加入...';
  const micBtn = $('micBtn');
  if (State.call.isMuted) {
    micBtn.className = 'call-btn mic-off';
    micBtn.textContent = '🔇 已静音';
  } else {
    micBtn.className = 'call-btn mic-on';
    micBtn.textContent = '🎤 静音';
  }
}

function toggleMic() {
  if (!State.call) return;
  State.call.isMuted = !State.call.isMuted;
  State.call.localStream.getAudioTracks().forEach(t => { t.enabled = !State.call.isMuted; });
  updateCallUI();
}

function endCall() {
  if (!State.call) return;
  // 通知对方
  const ctrl = { type: 'call_control', action: 'hangup', channel: State.call.channel };
  if (State.call.target) ctrl.to = State.call.target;
  sendWS(ctrl);
  // 清理
  State.call.peers.forEach(pc => { try { pc.close(); } catch (_) {} });
  State.call.localStream.getTracks().forEach(t => t.stop());
  document.querySelectorAll('audio[id^="audio-"]').forEach(a => a.remove());
  State.call = null;
  $('callFloat').style.display = 'none';
}

// ---------- UI 渲染 ----------
function renderConvList() {
  // 始终保证群聊会话存在
  ensureConv('group', 'group', '群聊房间');
  // 为每个用户准备私聊会话占位
  State.users.forEach((u, uid) => {
    if (!State.conversations.has(uid)) {
      ensureConv(uid, 'private', u.nickname);
    } else {
      State.conversations.get(uid).name = u.nickname;
    }
  });

  const list = $('convList');
  // 排序：群聊置顶，其他按最后时间
  const items = Array.from(State.conversations.values());
  items.sort((a, b) => {
    if (a.id === 'group') return -1;
    if (b.id === 'group') return 1;
    return b.lastTs - a.lastTs;
  });
  list.innerHTML = '';
  for (const conv of items) {
    if (conv.type === 'private' && !State.users.has(conv.id) && conv.messages.length === 0) {
      continue; // 离线且无历史不显示
    }
    const last = conv.messages[conv.messages.length - 1];
    const preview = last
      ? (last.msgType === 'image' ? '[图片]' : (last.fromNickname ? last.fromNickname + ': ' : '') + (last.content || ''))
      : (conv.id === 'group' ? '加密群聊房间' : '点击发起私聊');
    const time = last ? formatTime(last.lastTs || last.ts) : '';
    const av = avatarOf(conv.id === 'group' ? '群' : conv.name);
    const isActive = State.activeConv === conv.id;
    const div = document.createElement('div');
    div.className = 'conv-item' + (isActive ? ' active' : '');
    div.innerHTML = `
      <div class="conv-avatar ${av.color}">${escapeHtml(av.ch)}</div>
      <div class="conv-info">
        <div class="conv-name">${escapeHtml(conv.name)}${conv.id !== 'group' && State.users.has(conv.id) ? '' : (conv.id === 'group' ? '' : ' <span style="font-size:11px;color:#bbb">(离线)</span>')}</div>
        <div class="conv-preview">${escapeHtml(preview).slice(0, 40)}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${time}</div>
        ${conv.unread > 0 ? `<div class="unread-dot">${conv.unread > 99 ? '99+' : conv.unread}</div>` : ''}
      </div>
    `;
    div.addEventListener('click', () => openConv(conv.id));
    list.appendChild(div);
  }
}

function openConv(convId) {
  State.activeConv = convId;
  const conv = State.conversations.get(convId);
  if (!conv) return;
  conv.unread = 0;
  $('chatTitle').textContent = conv.name + (conv.type === 'group' ? ' (' + (State.users.size + 1) + '人)' : '');
  $('mainPage').classList.add('show-chat');
  renderMsgList();
  renderConvList();
  scrollToBottom();
}

function buildRoomTip() {
  const wrap = document.createElement('div');
  wrap.className = 'room-tip';
  wrap.innerHTML = `
    <div class="room-tip-title">📌 使用说明</div>
    <div><b>群聊房间</b>：当前频道下所有人都能看到的加密公共聊天，使用频道码派生的密钥对消息加密。</div>
    <div style="margin-top:6px;"><b>左侧列表里的其他人</b>：点击任一在线用户即可进入端到端加密的<b>1 对 1 私聊</b>，密钥通过 ECDH 协商，仅你和对方能解密。</div>
    <ul>
      <li>分享当前频道：点击右上角 🔗 复制链接</li>
      <li>语音通话：点击 📞 发起，群通话或私聊通话</li>
      <li>所有消息端到端加密，服务端不存储任何聊天记录</li>
    </ul>

function renderMsgList() {
  const conv = State.conversations.get(State.activeConv);
  const box = $('msgList');
  box.innerHTML = '';
  if (!conv) return;
  if (conv.type === 'group') {
    box.appendChild(buildRoomTip());
  }
  let lastTs = 0;
  for (const m of conv.messages) {
    if (m.ts - lastTs > 5 * 60 * 1000) {
      const t = document.createElement('div');
      t.className = 'msg-time';
      t.textContent = formatTime(m.ts);
      box.appendChild(t);
    }
    lastTs = m.ts;
    box.appendChild(buildMsgRow(m));
  }
}

function appendMsgDom(m) {
  const box = $('msgList');
  // 时间分隔
  const last = box.lastElementChild;
  const lastTs = last && last._ts ? last._ts : 0;
  if (m.ts - lastTs > 5 * 60 * 1000) {
    const t = document.createElement('div');
    t.className = 'msg-time';
    t.textContent = formatTime(m.ts);
    t._ts = m.ts;
    box.appendChild(t);
  }
  const row = buildMsgRow(m);
  row._ts = m.ts;
  box.appendChild(row);
}

function buildMsgRow(m) {
  const isSelf = m.from === State.userId;
  const av = avatarOf(m.fromNickname || '');
  const row = document.createElement('div');
  row.className = 'msg-row' + (isSelf ? ' self' : '');

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar ' + av.color;
  avatarDiv.textContent = av.ch;
  // 群聊点击对方头像 -> 私聊
  if (!isSelf && State.activeConv === 'group') {
    avatarDiv.style.cursor = 'pointer';
    avatarDiv.addEventListener('click', () => {
      ensureConv(m.from, 'private', m.fromNickname);
      openConv(m.from);
    });
  }
  row.appendChild(avatarDiv);

  const content = document.createElement('div');
  content.className = 'msg-content';
  if (!isSelf && State.activeConv === 'group') {
    const nick = document.createElement('div');
    nick.className = 'msg-nickname';
    nick.textContent = m.fromNickname || '';
    content.appendChild(nick);
  }
  const bubble = document.createElement('div');
  if (m.msgType === 'image') {
    bubble.className = 'msg-bubble image-bubble';
    const img = document.createElement('img');
    img.src = m.content;
    img.addEventListener('click', () => {
      $('viewerImg').src = m.content;
      $('imageViewer').style.display = 'flex';
    });
    bubble.appendChild(img);
  } else {
    bubble.className = 'msg-bubble';
    bubble.textContent = m.content || '';
  }
  content.appendChild(bubble);
  row.appendChild(content);
  return row;
}

function scrollToBottom() {
  const box = $('msgList');
  requestAnimationFrame(() => {
    box.scrollTop = box.scrollHeight;
  });
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const same = d.toDateString() === now.toDateString();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  if (same) return `${hh}:${mm}`;
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${m}-${dd} ${hh}:${mm}`;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

// ---------- 图片压缩 ----------
async function compressImage(file, maxBytes = 1024 * 1024) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const MAX_DIM = 1600;
        if (width > MAX_DIM || height > MAX_DIM) {
          const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        let q = 0.85;
        let dataUrl = canvas.toDataURL('image/jpeg', q);
        // base64 字节估算 ≈ length * 0.75
        while (dataUrl.length * 0.75 > maxBytes && q > 0.3) {
          q -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', q);
        }
        // 还是太大，缩尺寸
        let scale = 0.9;
        while (dataUrl.length * 0.75 > maxBytes && scale > 0.3) {
          const c2 = document.createElement('canvas');
          c2.width = Math.round(width * scale);
          c2.height = Math.round(height * scale);
          c2.getContext('2d').drawImage(img, 0, 0, c2.width, c2.height);
          dataUrl = c2.toDataURL('image/jpeg', 0.7);
          scale -= 0.1;
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- 本地存储 / 随机生成 ----------
const LS_KEYS = { nick: 'wl_nickname', channels: 'wl_channels', muted: 'wl_muted' };
const ALNUM = 'abcdefghijklmnopqrstuvwxyz0123456789';
function randomAlnum(len) {
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  let s = '';
  for (let i = 0; i < len; i++) s += ALNUM[arr[i] % ALNUM.length];
  return s;
}
function randomNickname() {
  const adjs = ['神秘','匿名','加密','隐形','无声','低调','极速','幽灵','流浪','寂静','闪电','深蓝','银河','月光','风行'];
  const nouns = ['旅人','信使','观察者','低语','信号','节点','星辰','码农','客人','侦察兵','飞鸟','潜行者'];
  return adjs[Math.floor(Math.random()*adjs.length)] + nouns[Math.floor(Math.random()*nouns.length)] + randomAlnum(3);
}
// 频道存储格式：[{ id, ts }] 兼容旧格式（字符串数组）
function loadStoredChannels() {
  try {
    const raw = localStorage.getItem(LS_KEYS.channels);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return [];
    const now = Date.now();
    return arr.map(x => {
      if (typeof x === 'string') return { id: x, ts: now };
      if (x && typeof x.id === 'string') return { id: x.id, ts: x.ts || now };
      return null;
    }).filter(c => c && /^[A-Za-z0-9]{4,32}$/.test(c.id));
  } catch (_) { return []; }
}
function saveChannel(channelId) {
  const list = loadStoredChannels().filter(c => c.id !== channelId);
  list.unshift({ id: channelId, ts: Date.now() });
  while (list.length > 30) list.pop();
  try { localStorage.setItem(LS_KEYS.channels, JSON.stringify(list)); } catch (_) {}
}
function deleteStoredChannel(channelId) {
  const list = loadStoredChannels().filter(c => c.id !== channelId);
  try { localStorage.setItem(LS_KEYS.channels, JSON.stringify(list)); } catch (_) {}
}
function getUrlChannel() {
  try {
    const u = new URL(location.href);
    const c = u.searchParams.get('c') || u.searchParams.get('channel');
    return (c && /^[A-Za-z0-9]{4,32}$/.test(c)) ? c : '';
  } catch (_) { return ''; }
}
function buildShareUrl(channel) {
  const u = new URL(location.href);
  u.searchParams.set('c', channel);
  u.hash = '';
  return u.toString();
}
async function shareChannel() {
  if (!State.roomId) return;
  const url = buildShareUrl(State.roomId);
  try {
    if (navigator.share) {
      await navigator.share({ title: 'WhisperLink 频道', text: '加入加密频道 #' + State.roomId, url });
      return;
    }
  } catch (_) { /* fallthrough */ }
  try {
    await navigator.clipboard.writeText(url);
    showToast('频道链接已复制');
  } catch (_) {
    prompt('复制以下链接分享给好友：', url);
  }
}
function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return '刚刚';
  if (d < 3600000) return Math.floor(d/60000) + ' 分钟前';
  if (d < 86400000) return Math.floor(d/3600000) + ' 小时前';
  if (d < 86400000*7) return Math.floor(d/86400000) + ' 天前';
  const dt = new Date(ts);
  return `${dt.getMonth()+1}月${dt.getDate()}日`;
}
function channelColorClass(id) {
  let h = 0; for (let i = 0; i < id.length; i++) h = (h*31 + id.charCodeAt(i)) >>> 0;
  return 'avatar-c' + (h % 8);
}
function renderHistoryChannelList() {
  const list = loadStoredChannels();
  $('historyBadge').textContent = list.length;
  const box = $('channelList');
  box.innerHTML = '';
  if (list.length === 0) {
    box.innerHTML = '<div class="channel-list-empty">暂无历史频道<br/>加入或新建一个频道开始聊天</div>';
    return;
  }
  for (const c of list) {
    const item = document.createElement('div');
    item.className = 'channel-item';
    item.innerHTML = `
      <div class="ch-icon ${channelColorClass(c.id)}">#</div>
      <div class="ch-info">
        <div class="ch-name">${escapeHtml(c.id)}</div>
        <div class="ch-time">上次进入：${timeAgo(c.ts)}</div>
      </div>
      <button type="button" class="ch-del" title="从历史中移除" data-del="${escapeHtml(c.id)}">×</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.dataset && e.target.dataset.del) {
        e.stopPropagation();
        deleteStoredChannel(e.target.dataset.del);
        renderHistoryChannelList();
        return;
      }
      $('roomInput').value = c.id;
      doLogin();
    });
    box.appendChild(item);
  }
}
function switchLoginTab(name) {
  document.querySelectorAll('.login-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  $('tabPanelNew').classList.toggle('active', name === 'new');
  $('tabPanelHistory').classList.toggle('active', name === 'history');
}
function prefillLogin() {
  // 昵称
  try {
    const nick = localStorage.getItem(LS_KEYS.nick);
    if (nick) $('nicknameInput').value = nick;
  } catch (_) {}
  // 是否静音
  try {
    State.muted = localStorage.getItem(LS_KEYS.muted) === '1';
    $('soundToggle').textContent = State.muted ? '🔕' : '🔔';
    $('soundToggle').classList.toggle('muted', State.muted);
  } catch (_) {}

  const channels = loadStoredChannels();
  const urlCh = getUrlChannel();
  renderHistoryChannelList();

  // 决定默认 Tab：URL 有频道码 → 新建/加入并预填；否则有历史 → 历史；否则 新建
  if (urlCh) {
    $('roomInput').value = urlCh;
    switchLoginTab('new');
  } else if (channels.length > 0) {
    switchLoginTab('history');
  } else {
    switchLoginTab('new');
    // 默认建议一个随机频道码方便直接点进入
    if (!$('roomInput').value) $('roomInput').value = randomAlnum(12);
  }
}

// ---------- 提示音 ----------
let _audioCtx = null;
let _lastBeep = 0;
function ensureAudioCtx() {
  if (_audioCtx) return _audioCtx;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (Ctx) _audioCtx = new Ctx();
  } catch (_) {}
  return _audioCtx;
}
function playBeep() {
  if (State.muted) return;
  const now = Date.now();
  if (now - _lastBeep < 800) return; // 节流
  _lastBeep = now;
  const ctx = ensureAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch (_) {} }
  try {
    const t = ctx.currentTime;
    const playTone = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, t + start);
      gain.gain.exponentialRampToValueAtTime(0.18, t + start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + start + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t + start);
      osc.stop(t + start + dur + 0.02);
    };
    playTone(880, 0, 0.09);
    playTone(1320, 0.10, 0.13);
  } catch (_) {}
}
function shouldNotifyFor(convId) {
  // 页面失焦 → 通知；或者当前活动会话不是该会话 → 通知
  if (document.hidden || !document.hasFocus()) return true;
  if (State.activeConv !== convId) return true;
  return false;
}
function toggleMute() {
  State.muted = !State.muted;
  $('soundToggle').textContent = State.muted ? '🔕' : '🔔';
  $('soundToggle').classList.toggle('muted', State.muted);
  try { localStorage.setItem(LS_KEYS.muted, State.muted ? '1' : '0'); } catch (_) {}
  if (!State.muted) {
    // 解锁 audio context
    const ctx = ensureAudioCtx();
    if (ctx && ctx.state === 'suspended') try { ctx.resume(); } catch (_) {}
    showToast('提示音已开启');
  } else {
    showToast('提示音已关闭');
  }
}
function leaveRoom() {
  if (!confirm('确定退出当前频道？')) return;
  if (State.call) try { endCall(); } catch (_) {}
  if (State.ws) try { State.ws.close(); } catch (_) {}
  // 清除 URL 参数
  try {
    const u = new URL(location.href);
    u.searchParams.delete('c');
    u.searchParams.delete('channel');
    history.replaceState(null, '', u.toString());
  } catch (_) {}
  location.reload();
}

// ---------- 事件绑定 ----------
function bindEvents() {
  $('loginBtn').addEventListener('click', doLogin);
  $('roomInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
  $('nicknameInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
  $('randomNickBtn').addEventListener('click', () => {
    $('nicknameInput').value = randomNickname();
  });
  $('randomRoomBtn').addEventListener('click', () => {
    $('roomInput').value = randomAlnum(12);
  });
  // 登录页 Tab 切换
  document.querySelectorAll('.login-tab').forEach(t => {
    t.addEventListener('click', () => switchLoginTab(t.dataset.tab));
  });

  $('shareBtn').addEventListener('click', shareChannel);
  $('soundToggle').addEventListener('click', toggleMute);
  $('leaveBtn').addEventListener('click', leaveRoom);

  $('backBtn').addEventListener('click', () => {
    $('mainPage').classList.remove('show-chat');
    State.activeConv = null;
    renderConvList();
  });

  $('sendBtn').addEventListener('click', onSendClick);
  $('msgInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      onSendClick();
    }
  });
  $('msgInput').addEventListener('input', (e) => {
    const ta = e.target;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });

  $('imageBtn').addEventListener('click', () => $('imageInput').click());
  $('imageInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      showToast('压缩图片中...');
      const dataUrl = await compressImage(file);
      await sendMessage('image', dataUrl);
    } catch (err) {
      showToast('图片处理失败');
    } finally {
      e.target.value = '';
    }
  });

  $('callBtn').addEventListener('click', () => {
    if (!State.activeConv) return;
    const conv = State.conversations.get(State.activeConv);
    if (!conv) return;
    if (conv.type === 'group') startCall('group');
    else startCall('private', conv.id);
  });

  $('micBtn').addEventListener('click', toggleMic);
  $('hangupBtn').addEventListener('click', endCall);
  $('acceptBtn').addEventListener('click', acceptInvite);
  $('rejectBtn').addEventListener('click', rejectInvite);

  $('imageViewer').addEventListener('click', () => {
    $('imageViewer').style.display = 'none';
  });
}

async function onSendClick() {
  const ta = $('msgInput');
  const text = ta.value.trim();
  if (!text) return;
  if (!State.activeConv) { showToast('请先选择会话'); return; }
  ta.value = '';
  ta.style.height = 'auto';
  await sendMessage('text', text);
}

async function doLogin() {
  const nickname = $('nicknameInput').value.trim();
  const room = $('roomInput').value.trim();
  if (!nickname) { showToast('请输入昵称'); return; }
  if (!/^[A-Za-z0-9]{4,32}$/.test(room)) { showToast('频道必须是 4-32 位字母或数字'); return; }
  $('loginBtn').disabled = true;
  // 解锁 AudioContext（必须在用户手势中）
  try { const ctx = ensureAudioCtx(); if (ctx && ctx.state === 'suspended') await ctx.resume(); } catch (_) {}
  try {
    State.nickname = nickname;
    State.roomId = room;
    State.roomKey = await deriveRoomKey(room);
    State.ecdhKeyPair = await genECDHKeyPair();
    State.pubKeyB64 = await exportPubKey(State.ecdhKeyPair);
    // 持久化（只有真正进入过的频道才写入）
    try {
      localStorage.setItem(LS_KEYS.nick, nickname);
      saveChannel(room);
    } catch (_) {}
    $('loginPage').style.display = 'none';
    $('mainPage').style.display = 'flex';
    $('roomTag').textContent = '#' + room;
    $('sidebarTitle').textContent = nickname;
    ensureConv('group', 'group', '群聊房间');
    renderConvList();
    connect();
  } catch (e) {
    showToast('初始化失败：' + e.message);
    $('loginBtn').disabled = false;
  }
}

// ---------- 启动 ----------
bindEvents();
prefillLogin();

// 防止移动端键盘弹起后视图错位
window.addEventListener('resize', () => {
  if (State.activeConv) scrollToBottom();
});

// 页面关闭时清理
window.addEventListener('beforeunload', () => {
  if (State.call) endCall();
  if (State.ws) try { State.ws.close(); } catch (_) {}
});
